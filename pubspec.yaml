name: diet
description: 纯本地健身饮食助手 — 热量配额、食材库与饮食记账
publish_to: 'none'
version: 1.1.1+6

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  shared_preferences: ^2.5.5
  fl_chart: ^1.2.0
  intl: ^0.20.2
  drift: ^2.34.2
  path_provider: ^2.1.6
  path: ^1.9.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  permission_handler: ^12.0.3
  package_info_plus: ^9.0.0
  http: ^1.5.0
  open_filex: ^4.7.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.15.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/food_seed.json
